{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">{{ 'Edit' if product else 'Add New' }} Product</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="name" name="name" 
                                   value="{{ product.name if product else '' }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="imei" class="form-label">IMEI Number</label>
                            <input type="text" class="form-control" id="imei" name="imei" 
                                   value="{{ product.imei if product else '' }}">
                        </div>
                        
                        <div class="mb-3">
                            <label for="price" class="form-label">Price (₦) *</label>
                            <input type="number" step="0.01" class="form-control" id="price" name="price" 
                                   value="{{ product.price if product else '' }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="stock_quantity" class="form-label">Stock Quantity</label>
                            <input type="number" class="form-control" id="stock_quantity" name="stock_quantity" 
                                   value="{{ product.stock_quantity if product else 1 }}" min="0">
                        </div>
                        
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Product
                        </button>
                        <a href="{{ url_for('products') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
