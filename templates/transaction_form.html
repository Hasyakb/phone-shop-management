{% extends "base.html" %}

{% block title %}New Transaction{% endblock %}
{% block page_title %}Create New Transaction{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-shopping-cart"></i> New Sale Transaction</h5>
            </div>
            <div class="card-body">
                <form method="POST" id="transactionForm">
                    <!-- Customer Selection -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Customer Information</label>
                        <div class="row">
                            <div class="col-md-8">
                                <select class="form-select" id="customer_id" name="customer_id">
                                    <option value="">Select Existing Customer</option>
                                    {% for customer in customers %}
                                    <option value="{{ customer.id }}" data-phone="{{ customer.phone_number }}">
                                        {{ customer.full_name }} - {{ customer.phone_number }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button type="button" class="btn btn-success w-100" data-bs-toggle="modal" data-bs-target="#newCustomerModal">
                                    <i class="fas fa-plus"></i> New Customer
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Product Selection -->
                    <div class="mb-3">
                        <label for="product_id" class="form-label fw-bold">Product *</label>
                        <select class="form-select" id="product_id" name="product_id" required>
                            <option value="">Select Product</option>
                            {% for product in products %}
                            <option value="{{ product.id }}" data-price="{{ product.price }}" data-imei="{{ product.imei }}">
                                {{ product.name }} - ₦{{ "{:,.2f}".format(product.price) }} (Stock: {{ product.stock_quantity }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- Phone IMEI -->
                    <div class="mb-3">
                        <label for="phone_imei" class="form-label fw-bold">Phone IMEI Number</label>
                        <input type="text" class="form-control" id="phone_imei" name="phone_imei" 
                               placeholder="Enter IMEI number for this specific phone">
                        <small class="text-muted">Optional but recommended for warranty tracking</small>
                    </div>
                    
                    <!-- Price Details -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="total_price" class="form-label fw-bold">Total Price (₦) *</label>
                            <input type="number" step="0.01" class="form-control" id="total_price" name="total_price" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="amount_paid" class="form-label fw-bold">Amount Paid (₦)</label>
                            <input type="number" step="0.01" class="form-control" id="amount_paid" name="amount_paid" value="0">
                        </div>
                    </div>
                    
                    <!-- Payment Type -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="payment_type" class="form-label fw-bold">Payment Type *</label>
                            <select class="form-select" id="payment_type" name="payment_type" required>
                                <option value="FULL">Full Payment</option>
                                <option value="INSTALLMENT">Installment Payment</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3" id="due_date_container" style="display: none;">
                            <label for="due_date" class="form-label fw-bold">Due Date</label>
                            <input type="date" class="form-control" id="due_date" name="due_date">
                        </div>
                    </div>
                    
                    <!-- Balance Preview -->
                    <div class="alert alert-info" id="balance_preview" style="display: none;">
                        <strong>Balance After Payment:</strong> <span id="balance_amount">₦0.00</span>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('transactions') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Create Transaction
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- New Customer Modal -->
<div class="modal fade" id="newCustomerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="fas fa-user-plus"></i> Add New Customer</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="newCustomerForm">
                    <div class="mb-3">
                        <label for="new_full_name" class="form-label">Full Name *</label>
                        <input type="text" class="form-control" id="new_full_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_phone_number" class="form-label">Phone Number *</label>
                        <input type="tel" class="form-control" id="new_phone_number" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_address" class="form-label">Address</label>
                        <textarea class="form-control" id="new_address" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="new_guarantor_name" class="form-label">Guarantor Name</label>
                        <input type="text" class="form-control" id="new_guarantor_name">
                    </div>
                    <div class="mb-3">
                        <label for="new_guarantor_phone" class="form-label">Guarantor Phone</label>
                        <input type="tel" class="form-control" id="new_guarantor_phone">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" onclick="createCustomer()">
                    <i class="fas fa-save"></i> Create Customer
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Auto-fill total price when product is selected
    document.getElementById('product_id').addEventListener('change', function() {
        var selectedOption = this.options[this.selectedIndex];
        var price = selectedOption.getAttribute('data-price');
        var imei = selectedOption.getAttribute('data-imei');
        
        if (price) {
            document.getElementById('total_price').value = price;
            if (imei && !document.getElementById('phone_imei').value) {
                document.getElementById('phone_imei').value = imei;
            }
        }
        updateBalancePreview();
    });
    
    // Update balance preview
    document.getElementById('total_price').addEventListener('input', updateBalancePreview);
    document.getElementById('amount_paid').addEventListener('input', updateBalancePreview);
    
    function updateBalancePreview() {
        var total = parseFloat(document.getElementById('total_price').value) || 0;
        var paid = parseFloat(document.getElementById('amount_paid').value) || 0;
        var balance = total - paid;
        
        if (total > 0) {
            document.getElementById('balance_preview').style.display = 'block';
            document.getElementById('balance_amount').innerHTML = '₦' + balance.toLocaleString('en-NG', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            if (balance < 0) {
                document.getElementById('balance_amount').style.color = 'red';
            } else {
                document.getElementById('balance_amount').style.color = 'green';
            }
        } else {
            document.getElementById('balance_preview').style.display = 'none';
        }
    }
    
    // Show/hide due date based on payment type
    document.getElementById('payment_type').addEventListener('change', function() {
        var container = document.getElementById('due_date_container');
        if (this.value === 'INSTALLMENT') {
            container.style.display = 'block';
        } else {
            container.style.display = 'none';
        }
    });
    
    // Validate amount paid
    document.getElementById('amount_paid').addEventListener('change', function() {
        var totalPrice = parseFloat(document.getElementById('total_price').value) || 0;
        var amountPaid = parseFloat(this.value) || 0;
        
        if (amountPaid > totalPrice) {
            alert('Amount paid cannot be more than total price!');
            this.value = totalPrice;
            updateBalancePreview();
        }
    });
    
    // Create new customer via AJAX
    function createCustomer() {
        var customerData = {
            full_name: document.getElementById('new_full_name').value,
            phone_number: document.getElementById('new_phone_number').value,
            address: document.getElementById('new_address').value,
            guarantor_name: document.getElementById('new_guarantor_name').value,
            guarantor_phone: document.getElementById('new_guarantor_phone').value
        };
        
        if (!customerData.full_name || !customerData.phone_number) {
            alert('Please fill in Customer Name and Phone Number!');
            return;
        }
        
        fetch('/api/customers', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(customerData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Add new customer to select dropdown
                var select = document.getElementById('customer_id');
                var option = document.createElement('option');
                option.value = data.customer_id;
                option.text = data.full_name + ' - ' + data.phone_number;
                option.setAttribute('data-phone', data.phone_number);
                select.add(option, select.options[select.options.length - 1]);
                select.value = data.customer_id;
                
                // Close modal and show success message
                var modal = bootstrap.Modal.getInstance(document.getElementById('newCustomerModal'));
                modal.hide();
                
                alert('Customer created successfully!');
            } else {
                alert('Error: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error creating customer. Please try again.');
        });
    }
</script>
{% endblock %}
